<!DOCTYPE html>
<html lange="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport " content="width-device-width, initial-scale-1.0">
    <title>Zlatan Barber Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
   <header>
       <h1>Zlatan D Barber</h1>
       <nav>
           <a href="#">Home</a>
           <a href="#">Services</a>
           <a href="#">Gallery</a>
           <a href="#">Book</a>
           <a href="#">Contact</a>
       </nav>
   </header>

   <div class="content">

    <!-- LEFT IMAGE -->
     <div class="left">
        <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033" alt="barber">
     </div>

    <!-- RIGHT SIDE -->
     <div class="right">

        <h2>Our services</h2>
        <p>Fade Cut - Le 50</p>
        <p>Hair + Beard - Le 80</p>
        <p>Hair Wash - Le 30</p>

        <!-- BOOKING FORM -->
         <h2>Book Appointment</h2>
         <form class="booking-form">
            <input type="text" placeholder="Your Name" required>
            <input type="date" required>
            <input type="time" required>
            <button type="submit">Book Now</button>
         </form>
     </div>

        <div class="bottom">
            <h3>Contact</h3>
            <p>+23280973015</p>
            <button>WhatsApp</button>
        </div>

     </div>

   </div>
  
     <!-- Gallery -->
     <section class="gallery">
        <div class="gallery-container">
            <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70">
            <img src="https://images.unsplash.com/photo-1593702288058-1c0e7b6e89f9">
            <img src="https://images.unsplash.com/photo-1622287162716-9b4b7c2e63b6">
        </div>
     </section>

     <!-- Booking  -->
      <section id="booking " class="booking">
             <h2>Book Appointment</h2>
             <form id="bookingform">
                  <input type="text " id="name " placeholder="Your Name " required>
                  <input type="date " id="date " required>
                  <input type="time " id="time " required>
                  <button type="submit ">Book</button>
             </form>
      </section>

      <script src="script.js"></script>
</body>
</html>
